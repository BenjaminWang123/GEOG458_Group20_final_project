<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    intensity.html
    --------------------------------------------------
    Page for the Foot Traffic Intensity section.
    The repeated page layout is generated by js/main.js.
    Page-specific map logic is stored in js/intensity.js.
    Chart rendering logic is stored in js/intensity_chart.js.
  -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foot Traffic Intensity</title>

  <!-- Shared project stylesheet -->
  <link rel="stylesheet" href="../css/style.css" />

  <!-- Mapbox GL CSS -->
  <link
    href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css"
    rel="stylesheet"
  />
</head>
<body>
  <div id="app"></div>

  <!-- Shared layout generator -->
  <script src="../js/main.js"></script>

  <!-- Mapbox GL JS -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>

  <!-- Chart.js for weekly + hourly charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Chart helpers should load before intensity.js -->
  <script src="../js/intensity_chart.js"></script>

  <!-- Page-specific logic -->
  <script src="../js/intensity.js"></script>

  <script>
    renderMapPage("app", {
      currentPage: "intensity",
      pageNumber: "01",
      title: "Foot Traffic Intensity",
      subtitle: "This page introduces the spatial distribution of commercial foot traffic intensity.",
      description:
        "This page displays a Seattle foot traffic heatmap with a year filter, popup details, and supporting charts.",
      insights: [
        "Identify commercial hotspots",
        "Compare activity intensity across places",
        "Highlight concentrated visitor patterns"
      ],
      toolbar: ["Legend", "Filters", "Layers"],
      mapId: "intensity-map",
      panelTitle: "Intensity Dashboard",
      chartId: "intensity-chart"
    });

    initIntensityTemplate();
  </script>
</body>
</html>
