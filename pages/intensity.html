<!DOCTYPE html>
<html lang="en">
<head>

    intensity.html
    --------------------------------------------------
    Page for the Foot Traffic Intensity section.

  -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foot Traffic Intensity</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="app"></div>

  <script src="../js/main.js"></script>
  <script src="../js/intensity_map.js"></script>
  <script>
    renderMapPage("app", {
      currentPage: "intensity",
      pageNumber: "01",
      title: "Foot Traffic Intensity",

        "Compare activity intensity across places",

      toolbar: ["Legend", "Filters", "Layers"],
      mapId: "intensity-map",
      panelTitle: "Intensity Dashboard Placeholder",
      chartId: "intensity-chart"

    initIntensityTemplate();
