<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    category.html
    --------------------------------------------------
    Page for the Brand / Category section.
    Layout is generated by js/main.js.
    Page-specific logic is in js/category_map.js.
  -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brand & Category</title>

  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet" />
</head>
<body>
  <div id="app"></div>

  <script src="../js/main.js"></script>
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../js/category_map.js"></script>

  <script>
    renderMapPage("app", {
      currentPage: "category",
      pageNumber: "03",
      title: "Brand & Category",
      subtitle: "This page focuses on different categories for restaurants.",
      description:
        "This page visualizes restaurant locations and compares category tags such as Breakfast, Lunch, Dinner, and Take Out & Delivery Only.",
      insights: [
        "Show restaurant categories across locations",
        "Support commercial structure analysis"
      ],
      toolbar: ["Category", "Rank", "Legend"],
      mapId: "category-map",
      panelTitle: "Category Dashboard",
      chartId: "category-chart"
    });

    initCategoryTemplate();
  </script>
</body>
</html>
