<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visitor Flows</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.9.4/mapbox-gl.css" rel="stylesheet" />
  <style>
    #flow-map {
      min-height: 620px;
      overflow: hidden;
    }

    #flow-map .mapboxgl-canvas {
      border-radius: 24px;
    }

    .flow-controls {
      display: grid;
      gap: 1rem;
    }

    .flow-field {
      display: grid;
      gap: 0.35rem;
    }

    .flow-field label,
    .flow-summary-label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6d7683;
    }

    .flow-field select {
      width: 100%;
      padding: 0.7rem 0.85rem;
      border: 1px solid rgba(24, 34, 56, 0.14);
      border-radius: 12px;
      background: #fff;
      color: #1e2430;
      font: inherit;
    }

    .flow-summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .flow-stat {
      padding: 0.85rem 0.9rem;
      border-radius: 14px;
      background: rgba(248, 250, 252, 0.95);
      border: 1px solid rgba(24, 34, 56, 0.08);
    }

    .flow-stat strong {
      display: block;
      margin-top: 0.2rem;
      font-size: 1.1rem;
      color: #132238;
    }

    .flow-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.85rem;
      margin-top: 1rem;
      font-size: 0.92rem;
      color: #39465a;
    }

    .flow-legend-item {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
    }

    .flow-legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 999px;
    }

    .flow-status {
      margin-top: 0.9rem;
      font-size: 0.92rem;
      color: #4b5565;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="../js/main.js"></script>
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.9.4/mapbox-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="../js/flow.js"></script>
  <script>
    renderMapPage("app", {
      currentPage: "flow",
      pageNumber: "04",
      title: "Visitor Flows",
      subtitle: "Explore origin-destination visitor connections for individual timestamps in the uploaded flow dataset.",
      description:
        "Use the sidebar controls to choose a year and a specific date from the dataset. The map shows origin points, destination points, and connecting lines weighted by visitor flow.",
      insights: [
        "Each line represents one origin-to-destination flow",
        "Line thickness scales with visitor volume",
        "Origins and destinations update when time changes"
      ],
      toolbar: ["Year", "Date", "Flow Weight"],
      mapId: "flow-map",
      panelTitle: "Flow Controls",
      chartId: "flow-chart"
    });

    initFlowPage();
  </script>
</body>
</html>
